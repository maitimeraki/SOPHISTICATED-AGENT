        <div class="card" style="width: 100%">

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',

              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#FF69B4", "id": "anonymize_question", "label": "anonymize_question", "physics": false, "shape": "dot", "x": 0, "y": 0}, {"color": "#00FF00", "id": "planner", "label": "planner", "physics": false, "shape": "dot", "x": 306.25, "y": -100}, {"color": "#FF69B4", "id": "de_anonymize_plan", "label": "de_anonymize_plan", "physics": false, "shape": "dot", "x": 612.5, "y": -100}, {"color": "#FF69B4", "id": "break_down_plan", "label": "break_down_plan", "physics": false, "shape": "dot", "x": 918.75, "y": -100}, {"color": "#FF69B4", "id": "task_handler", "label": "task_handler", "physics": false, "shape": "dot", "x": 1225.0, "y": 0}, {"color": "#FF69B4", "id": "retrieve_chunks", "label": "retrieve_chunks", "physics": false, "shape": "dot", "x": 1531.25, "y": 200}, {"color": "#FF69B4", "id": "retrieve_summaries", "label": "retrieve_summaries", "physics": false, "shape": "dot", "x": 1531.25, "y": 100}, {"color": "#FF69B4", "id": "retrieve_book_quotes", "label": "retrieve_book_quotes", "physics": false, "shape": "dot", "x": 1531.25, "y": 0}, {"color": "#FF69B4", "id": "answer", "label": "answer", "physics": false, "shape": "dot", "x": 1531.25, "y": -100}, {"color": "#FF69B4", "id": "replan", "label": "replan", "physics": false, "shape": "dot", "x": 1837.5, "y": 0}, {"color": "#FF69B4", "id": "can_be_answered_already", "label": "can_be_answered_already", "physics": false, "shape": "dot", "x": 2143.75, "y": 0}, {"color": "#FF69B4", "id": "get_final_answer", "label": "get_final_answer", "physics": false, "shape": "dot", "x": 2450.0, "y": 0}]);
                  edges = new vis.DataSet([{"arrows": "to", "color": "#808080", "from": "anonymize_question", "to": "planner"}, {"arrows": "to", "color": "#808080", "from": "planner", "to": "de_anonymize_plan"}, {"arrows": "to", "color": "#808080", "from": "de_anonymize_plan", "to": "break_down_plan"}, {"arrows": "to", "color": "#808080", "from": "break_down_plan", "to": "task_handler"}, {"arrows": "to", "color": "#808080", "from": "task_handler", "to": "retrieve_chunks"}, {"arrows": "to", "color": "#808080", "from": "task_handler", "to": "retrieve_summaries"}, {"arrows": "to", "color": "#808080", "from": "task_handler", "to": "retrieve_book_quotes"}, {"arrows": "to", "color": "#808080", "from": "task_handler", "to": "answer"}, {"arrows": "to", "color": "#808080", "from": "retrieve_chunks", "to": "replan"}, {"arrows": "to", "color": "#808080", "from": "retrieve_summaries", "to": "replan"}, {"arrows": "to", "color": "#808080", "from": "retrieve_book_quotes", "to": "replan"}, {"arrows": "to", "color": "#808080", "from": "answer", "to": "replan"}, {"arrows": "to", "color": "#808080", "from": "replan", "to": "can_be_answered_already"}, {"arrows": "to", "color": "#808080", "from": "replan", "to": "break_down_plan"}, {"arrows": "to", "color": "#808080", "from": "can_be_answered_already", "to": "get_final_answer"}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": false
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "straight"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "enabled": false,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
